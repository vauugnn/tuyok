<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fare Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200">
  <div class="container mx-auto p-4">  <h1 class="text-3xl font-bold underline text-center">Tuyok</h1>

    <form method="post" action="/" class="mt-4"> <label for="enter_destination" class="block text-gray-700 font-bold mb-2">
        How far is your destination?
      </label>
      <input type="number" id="enter_destination" name="enter_destination" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
      <div class="flex items-center justify-center mt-4">
      <button type="submit" class="bg-orange-500 hover:bg-orange-700 text-white font-bold py-2 px-4 rounded mt-4">Calculate Fare</button>
    </div>
    </form>

    {% if fare %}
      <p class="text-orange-500 mt-4 text-center">Your fare is: {{ fare }}</p> {% endif %}
  </div>
</body>
</html>
