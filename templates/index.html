<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fare Calculator</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200">
<div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold text-center sm:text-2xl">Tuyok</h1>
        <form method="POST" action="/" class="mt-4">  
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <label for="enter_destination" class="block text-gray-700 font-bold mb-2">
            How far is your destination?
        </label>
        <input type="number" id="enter_destination" name="enter_destination" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline sm:w-3/4">
        <div class="flex items-center">
            <input type="checkbox" id="discount" name="discount">
            <label for="discount" class="ml-2">Are you a student, PWD, or senior citizen?</label>
        </div>
    </div>
        <button type="submit" name="calculate_fare" class="bg-orange-500 hover:bg-orange-700 text-white font-bold py-2 px-4 rounded mt-4">Calculate Fare</button>
        </form>
 
        <!-- this is for the map -->
        <div id="mapid" class="h-64"></div>

        {% if fare %}
        <p class="text-orange-500 mt-4 text-center sm:text-lg">Your fare is: {{ fare }}</p>
        {% endif %}
    </div>
    
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var mymap = L.map('mapid').setView([51.505, -0.09], 13);
    
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(mymap);
    
        var marker1 = L.marker([51.5, -0.09]).addTo(mymap);
        var marker2 = L.marker([51.495, -0.083]).addTo(mymap);
    
        var latlngs = [
            [51.5, -0.09],
            [51.495, -0.083]
        ];
        var polyline = L.polyline(latlngs, {color: 'red'}).addTo(mymap);
    
        var distance = mymap.distance(latlngs[0], latlngs[1]);
        alert("Distance between markers: " + distance + " meters");
    </script>
    </body>
    </html>
